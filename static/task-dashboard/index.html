<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>柏禧的任务驾驶舱</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f2ea;
      --panel: rgba(255, 252, 246, 0.88);
      --panel-strong: #fffdf8;
      --ink: #211d18;
      --muted: #756d62;
      --faint: #a79c8d;
      --line: rgba(63, 51, 38, 0.14);
      --p0: #b42318;
      --p1: #b85c00;
      --p2: #2f6f4e;
      --p3: #5a6472;
      --accent: #2f5f8f;
      --shadow: 0 18px 50px rgba(75, 59, 39, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(47, 95, 143, 0.13), transparent 30%),
        radial-gradient(circle at 88% 4%, rgba(184, 92, 0, 0.13), transparent 32%),
        linear-gradient(135deg, #f9f5ed 0%, var(--bg) 52%, #eee5d7 100%);
      color: var(--ink);
    }

    a { color: inherit; }

    .page {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 42px 0 64px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
      gap: 20px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero-main {
      padding: 34px;
      position: relative;
      overflow: hidden;
    }

    .hero-main::after {
      content: "";
      position: absolute;
      right: -90px;
      bottom: -120px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 58px solid rgba(47, 95, 143, 0.08);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(47, 95, 143, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 68px);
      letter-spacing: -0.06em;
      line-height: 0.96;
      max-width: 780px;
    }

    .hero-main p {
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.75;
      max-width: 760px;
      text-wrap: pretty;
    }

    .hero-side {
      padding: 26px;
      display: grid;
      gap: 14px;
    }

    .metric {
      border-bottom: 1px solid var(--line);
      padding-bottom: 15px;
    }

    .metric:last-child { border-bottom: 0; padding-bottom: 0; }

    .metric .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .metric .value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: 24px 0 16px;
      flex-wrap: wrap;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button, .pill {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.48);
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      min-height: 42px;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

    button:hover { transform: translateY(-1px); background: rgba(255,255,255,.78); }
    button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    button:focus-visible, a:focus-visible { outline: 3px solid rgba(47, 95, 143, 0.32); outline-offset: 3px; }

    .updated {
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .focus {
      grid-column: span 4;
      padding: 20px;
      min-height: 170px;
    }

    .focus h2, .task h2, .section-title {
      margin: 0;
      font-size: 17px;
      letter-spacing: -0.02em;
    }

    .focus ul {
      margin: 14px 0 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.65;
    }

    .tasks {
      margin-top: 16px;
      display: grid;
      gap: 14px;
    }

    .task {
      padding: 22px;
      display: grid;
      grid-template-columns: 152px minmax(0, 1fr) 260px;
      gap: 22px;
      align-items: start;
    }

    .priority {
      display: inline-flex;
      width: fit-content;
      font-weight: 900;
      letter-spacing: -0.04em;
      font-size: 28px;
      line-height: 1;
      padding: 12px 14px;
      border-radius: 18px;
      color: #fff;
    }

    .p0 { background: var(--p0); }
    .p1 { background: var(--p1); }
    .p2 { background: var(--p2); }
    .p3 { background: var(--p3); }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .pill {
      cursor: default;
      min-height: auto;
      padding: 7px 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .task h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .task p {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .task strong { color: var(--ink); }

    .next {
      background: rgba(47, 95, 143, 0.08);
      border: 1px solid rgba(47, 95, 143, 0.14);
      border-radius: 18px;
      padding: 14px;
      color: #244a70;
      line-height: 1.55;
      font-weight: 650;
    }

    details {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    summary {
      cursor: pointer;
      color: var(--ink);
      font-weight: 700;
    }

    details ul {
      margin: 10px 0 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.65;
    }

    .footer-note {
      margin-top: 18px;
      padding: 18px 20px;
      color: var(--muted);
      line-height: 1.7;
    }

    .empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 920px) {
      .hero, .task { grid-template-columns: 1fr; }
      .focus { grid-column: span 12; }
      .task { gap: 14px; }
    }

    @media (max-width: 560px) {
      .page { width: min(100vw - 20px, 1180px); padding-top: 18px; }
      .hero-main, .hero-side, .task { padding: 18px; }
      .priority { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="card hero-main">
        <div class="eyebrow"><span class="dot"></span> Task cockpit</div>
        <h1>任务不是越多越真实，真正危险的是没有排序。</h1>
        <p id="principle">加载任务中……</p>
      </div>
      <aside class="card hero-side" aria-label="任务摘要">
        <div class="metric"><div class="label">当前任务</div><div class="value" id="totalCount">—</div></div>
        <div class="metric"><div class="label">P0 风险</div><div class="value" id="p0Count">—</div></div>
        <div class="metric"><div class="label">最近截止</div><div class="value" id="nearestDeadline">—</div></div>
      </aside>
    </section>

    <section class="grid" id="focusGrid"></section>

    <div class="toolbar">
      <div class="tabs" role="tablist" aria-label="任务筛选">
        <button class="active" data-filter="all">全部</button>
        <button data-filter="P0">P0</button>
        <button data-filter="P1">P1</button>
        <button data-filter="P2">P2</button>
        <button data-filter="active">未完成</button>
      </div>
      <div class="updated" id="updatedAt">更新时间：—</div>
    </div>

    <section class="tasks" id="tasks"></section>

    <section class="card footer-note">
      <strong>维护规则：</strong>这页只负责展示和排序；任务源数据在同目录的 <code>tasks.json</code>。后续你在聊天里告诉我新任务，我会先更新源数据，再重新生成/提交页面。这样 HTML 不会变成难维护的大杂烩。
    </section>
  </main>

  <script>
    const fmt = new Intl.DateTimeFormat('zh-CN', { timeZone: 'Asia/Shanghai', month: '2-digit', day: '2-digit', weekday: 'short' });
    const priorityOrder = { P0: 0, P1: 1, P2: 2, P3: 3 };
    let state = { data: null, filter: 'all' };

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
    }

    function dateLabel(dateString) {
      if (!dateString) return '无截止';
      const date = new Date(dateString + 'T00:00:00+08:00');
      return fmt.format(date).replace('/', '/');
    }

    function sortTasks(tasks) {
      return [...tasks].sort((a, b) => {
        const p = (priorityOrder[a.priority] ?? 9) - (priorityOrder[b.priority] ?? 9);
        if (p) return p;
        return String(a.deadline || '9999').localeCompare(String(b.deadline || '9999'));
      });
    }

    function renderSummary(data) {
      const tasks = data.tasks || [];
      document.getElementById('principle').textContent = data.principle || '';
      document.getElementById('totalCount').textContent = tasks.length;
      document.getElementById('p0Count').textContent = tasks.filter(t => t.priority === 'P0').length;
      const nearest = sortTasks(tasks).find(t => t.status !== '已完成' && t.deadline);
      document.getElementById('nearestDeadline').textContent = nearest ? dateLabel(nearest.deadline) : '—';
      document.getElementById('updatedAt').textContent = '更新时间：' + new Date(data.updatedAt).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
    }

    function renderFocus(data) {
      const grid = document.getElementById('focusGrid');
      const focusItems = data.weekFocus || [];
      grid.innerHTML = `
        <article class="card focus">
          <h2>本周策略</h2>
          <ul>${focusItems.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
        </article>
        <article class="card focus">
          <h2>今天不要做</h2>
          <ul>
            <li>不要先陷入全景图排版。</li>
            <li>不要在龙虾没通前补太多边角细节。</li>
            <li>不要让数据看板抢走 P0 链路风险的时间。</li>
          </ul>
        </article>
        <article class="card focus">
          <h2>默认下一步</h2>
          <ul>
            <li>如果只能做一件事：先跑 fornax 自测。</li>
            <li>如果自测出现 blocker：立刻记录失败点和需要找的人。</li>
            <li>如果自测有结论：转去打通 byteclaw 龙虾最小链路。</li>
          </ul>
        </article>`;
    }

    function taskVisible(task) {
      if (state.filter === 'all') return true;
      if (state.filter === 'active') return task.status !== '已完成' && task.status !== '放弃';
      return task.priority === state.filter;
    }

    function renderTasks() {
      const el = document.getElementById('tasks');
      const tasks = sortTasks(state.data.tasks || []).filter(taskVisible);
      if (!tasks.length) {
        el.innerHTML = '<div class="card empty">这个筛选下没有任务。</div>';
        return;
      }
      el.innerHTML = tasks.map(task => `
        <article class="card task" id="${escapeHtml(task.id)}">
          <div>
            <div class="priority ${escapeHtml(task.priority.toLowerCase())}">${escapeHtml(task.priority)}</div>
            <div class="meta">
              <span class="pill">${escapeHtml(task.status)}</span>
              <span class="pill">${escapeHtml(task.deadlineLabel || dateLabel(task.deadline))}</span>
              <span class="pill">杠杆：${escapeHtml(task.leverage)}</span>
              <span class="pill">${escapeHtml(task.timeboxMinutes)} 分钟时间盒</span>
            </div>
          </div>
          <div>
            <h2>${escapeHtml(task.title)}</h2>
            <p><strong>风险：</strong>${escapeHtml(task.risk)}</p>
            <p><strong>背景：</strong>${escapeHtml(task.context)}</p>
            <p><strong>当前 blocker：</strong>${escapeHtml(task.blocker)}</p>
            <details>
              <summary>够好标准</summary>
              <ul>${(task.goodEnough || []).map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
            </details>
          </div>
          <aside class="next">
            下一步：${escapeHtml(task.nextAction)}
          </aside>
        </article>
      `).join('');
    }

    function bindTabs() {
      document.querySelectorAll('[data-filter]').forEach(button => {
        button.addEventListener('click', () => {
          state.filter = button.dataset.filter;
          document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b === button));
          renderTasks();
        });
      });
    }

    async function main() {
      try {
        const response = await fetch('./tasks.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('无法读取 tasks.json');
        state.data = await response.json();
        renderSummary(state.data);
        renderFocus(state.data);
        renderTasks();
        bindTabs();
      } catch (error) {
        document.getElementById('tasks').innerHTML = `<div class="card empty">加载失败：${escapeHtml(error.message)}</div>`;
      }
    }

    main();
  </script>
</body>
</html>
